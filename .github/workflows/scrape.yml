name: Auto Scrape BBC News

# 触发条件：定时触发 + 手动触发
on:
  schedule:
    - cron: '*/0 * * * *'  # 每 60 分钟运行一次 (基于 UTC 时间)
  workflow_dispatch:        # 允许你在 GitHub 网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 赋予机器人写入代码库的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python bbc_reader.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 如果有新文件生成，就提交并推送到仓库
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto add new article" && git push)
